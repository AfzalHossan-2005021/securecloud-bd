# ──────────────────────────────────────────────────────────────────────────────
# logstash-pipeline.conf
#
# SecureCloud-BD Logstash pipeline.
#
# Data flow:
#
#   Filebeat (DaemonSet)         →  beats input (5044)
#   Falco JSON events            →  beats input (5044, type=falco)
#   Zeek conn.log TSV            →  beats input (5044, type=zeek)
#
#   → JSON decode
#   → Zeek TSV parse + field type conversion
#   → Falco alert normalisation
#   → GeoIP enrichment for external source/destination IPs
#   → @timestamp normalisation
#   → Kubernetes metadata enrichment (already added by Filebeat; preserved here)
#
#   → Elasticsearch output
#        securecloud-logs-YYYY.MM.dd   (generic / Kubernetes logs)
#        securecloud-falco-YYYY.MM.dd  (Falco security alerts)
#        securecloud-zeek-YYYY.MM.dd   (Zeek network flow data)
#
# GeoIP database:
#   Logstash ships with a bundled GeoLite2-City database under the Elastic
#   licence.  The database is automatically refreshed if Logstash can reach
#   the internet.  On an offline cluster the bundled DB is used; it may be
#   up to 30 days stale, which is acceptable for research.
#
# Index naming:
#   Rolling daily indices (YYYY.MM.dd suffix) keep each day's data manageable.
#   ILM policies should be configured in Kibana to delete indices older than
#   30 days to stay within the 20 Gi PVC budget.
# ──────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
# INPUT
# ══════════════════════════════════════════════════════════════════════════════

input {
  beats {
    port => 5044
    # SSL disabled — Istio mTLS handles transport encryption between
    # Filebeat pods and Logstash over the cluster overlay network.
    # If deploying outside of Istio, enable ssl and provide cert/key.
    ssl => false
    # client_inactivity_timeout: close idle connections after 60 s to
    # free Logstash pipeline worker threads.
    client_inactivity_timeout => 60
  }
}

# ══════════════════════════════════════════════════════════════════════════════
# FILTER
# ══════════════════════════════════════════════════════════════════════════════

filter {

  # ── Step 1: Decode JSON payloads ───────────────────────────────────────────
  # Filebeat ships log lines as the `message` field.  If the message is valid
  # JSON (Falco, structured app logs, Kubernetes audit events), decode it
  # in place.  Non-JSON messages pass through unchanged.
  if [message] =~ /^\s*\{/ {
    json {
      source  => "message"
      # target => "[event][original]"  # uncomment to keep raw message
      # On parse failure, tag the event instead of dropping it so we can
      # route malformed events to a separate index for investigation.
      tag_on_failure => ["_jsonparsefailure"]
    }
  }

  # ── Step 2: Falco security alert normalisation ────────────────────────────
  # Falco events have fields: rule, priority, output, output_fields, time
  if [fields][log_type] == "falco" or [type] == "falco" {

    # Normalise the Falco timestamp to @timestamp if present.
    # Falco emits RFC3339 timestamps in the `time` field.
    if [time] {
      date {
        match   => ["time", "ISO8601"]
        target  => "@timestamp"
        # Keep the original field for audit trail
        tag_on_failure => ["_falco_date_parse_failure"]
      }
    }

    mutate {
      # Map Falco priority strings to ECS severity integers for Kibana alerting
      # (1=critical, 2=high, 3=medium, 4=low, 5=notice, 6=informational, 7=debug)
      add_field => {
        "event.kind"     => "alert"
        "event.category" => ["intrusion_detection"]
        "event.type"     => ["info"]
        "event.module"   => "falco"
        "event.dataset"  => "falco.alerts"
      }
    }

    # Convert Falco priority text to ECS severity numeric
    translate {
      source      => "priority"
      target      => "event.severity"
      dictionary  => {
        "CRITICAL"      => "1"
        "EMERGENCY"     => "1"
        "ALERT"         => "2"
        "ERROR"         => "3"
        "WARNING"       => "4"
        "NOTICE"        => "5"
        "INFORMATIONAL" => "6"
        "DEBUG"         => "7"
      }
      fallback    => "5"
    }
  }

  # ── Step 3: Zeek conn.log TSV parsing ────────────────────────────────────
  # Zeek writes tab-separated values with a fixed column order from conn.log.
  # Filebeat picks these up and sets fields.log_type=zeek.
  if [fields][log_type] == "zeek" or [type] == "zeek" {

    # Parse the TSV line (Zeek conn.log format, no header in each line)
    csv {
      source    => "message"
      separator => "	"    # literal tab character
      columns   => [
        "zeek.ts",
        "zeek.uid",
        "source.ip",
        "source.port",
        "destination.ip",
        "destination.port",
        "network.transport",
        "network.application",
        "event.duration",
        "source.bytes",
        "destination.bytes",
        "zeek.conn_state",
        "zeek.local_orig",
        "zeek.local_resp",
        "zeek.missed_bytes",
        "zeek.history",
        "source.packets",
        "zeek.orig_ip_bytes",
        "destination.packets",
        "zeek.resp_ip_bytes"
      ]
    }

    # Parse Zeek UNIX epoch timestamp into @timestamp
    date {
      match      => ["zeek.ts", "UNIX"]
      target     => "@timestamp"
      tag_on_failure => ["_zeek_date_parse_failure"]
    }

    # Convert string fields to their correct types
    mutate {
      convert => {
        "event.duration"        => "float"
        "source.bytes"          => "integer"
        "destination.bytes"     => "integer"
        "source.packets"        => "integer"
        "destination.packets"   => "integer"
        "zeek.orig_ip_bytes"    => "integer"
        "zeek.resp_ip_bytes"    => "integer"
        "source.port"           => "integer"
        "destination.port"      => "integer"
      }
      # Replace Zeek '-' placeholders with empty string so ES doesn't index them
      gsub => [
        "network.application", "^-$", "",
        "zeek.history",        "^-$", "",
        "zeek.conn_state",     "^-$", ""
      ]
      add_field => {
        "event.module"  => "zeek"
        "event.dataset" => "zeek.conn"
        "event.kind"    => "event"
        "event.category" => ["network"]
        "event.type"    => ["connection"]
      }
    }
  }

  # ── Step 4: Kubernetes application log normalisation ──────────────────────
  # Generic structured logs from the bKash demo services (frontend, payment-api).
  # These arrive with kubernetes.* metadata already added by Filebeat's
  # add_kubernetes_metadata processor.
  if [kubernetes][namespace] {
    mutate {
      add_field => {
        "event.kind"    => "event"
        "event.module"  => "kubernetes"
        "orchestrator.type"      => "kubernetes"
        "orchestrator.namespace" => "%{[kubernetes][namespace]}"
        "orchestrator.resource.name" => "%{[kubernetes][pod][name]}"
      }
    }
  }

  # ── Step 5: GeoIP enrichment ──────────────────────────────────────────────
  # Enrich external source and destination IPs with country, city, coordinates.
  # RFC1918 private addresses and loopback will not match and are silently skipped.

  # Source IP enrichment (Zeek uses source.ip; Falco may use connection.laddr)
  if [source][ip] and [source][ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|127\.|::1$|fc|fd)/ {
    geoip {
      source        => "[source][ip]"
      target        => "[source][geo]"
      fields        => ["city_name", "country_name", "country_code2", "location", "region_name"]
      tag_on_failure => ["_geoip_source_failure"]
    }
    geoip {
      source        => "[source][ip]"
      target        => "[source][as]"
      default_database_type => "ASN"
      fields        => ["autonomous_system_number", "autonomous_system_organization"]
      tag_on_failure => ["_geoip_asn_source_failure"]
    }
  }

  # Destination IP enrichment
  if [destination][ip] and [destination][ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|127\.|::1$|fc|fd)/ {
    geoip {
      source        => "[destination][ip]"
      target        => "[destination][geo]"
      fields        => ["city_name", "country_name", "country_code2", "location", "region_name"]
      tag_on_failure => ["_geoip_dest_failure"]
    }
    geoip {
      source        => "[destination][ip]"
      target        => "[destination][as]"
      default_database_type => "ASN"
      fields        => ["autonomous_system_number", "autonomous_system_organization"]
      tag_on_failure => ["_geoip_asn_dest_failure"]
    }
  }

  # ── Step 6: @timestamp guarantee ──────────────────────────────────────────
  # If no filter above has set @timestamp (e.g. plain-text app logs with no
  # timestamp field), fall back to Filebeat's event.created time.
  if [@timestamp] == "%{@timestamp}" or ![@timestamp] {
    date {
      match  => ["[event][created]", "ISO8601", "UNIX_MS", "UNIX"]
      target => "@timestamp"
      tag_on_failure => ["_timestamp_fallback_failure"]
    }
  }

  # ── Step 7: Cluster metadata ──────────────────────────────────────────────
  # Tag every event with cluster identity so multi-cluster setups stay separated.
  mutate {
    add_field => {
      "labels.cluster" => "securecloud-local"
    }
  }

  # ── Step 8: Drop internal heartbeat events ─────────────────────────────────
  # Filebeat sends internal monitoring events; drop them to keep indices clean.
  if [type] == "heartbeat" or [metricset][name] == "stats" {
    drop {}
  }

}

# ══════════════════════════════════════════════════════════════════════════════
# OUTPUT
# ══════════════════════════════════════════════════════════════════════════════

output {

  # ── Route by log type into separate daily indices ─────────────────────────
  if [fields][log_type] == "falco" or [type] == "falco" {

    elasticsearch {
      hosts    => ["http://securecloud-es-master:9200"]
      index    => "securecloud-falco-%{+YYYY.MM.dd}"
      # Credentials — injected from environment (see logstash-values.yaml extraEnvs)
      # When xpack.security is disabled these are ignored by Elasticsearch.
      user     => "elastic"
      password => "${ELASTIC_PASSWORD}"
      # Bulk indexing settings — tuned for low-throughput security event stream
      bulk_max_size       => 50
      idle_flush_time     => 5
      retry_on_conflict   => 3
      # ILM — disabled here; configure ILM policies separately in Kibana
      ilm_enabled => false
    }

  } else if [fields][log_type] == "zeek" or [type] == "zeek" {

    elasticsearch {
      hosts    => ["http://securecloud-es-master:9200"]
      index    => "securecloud-zeek-%{+YYYY.MM.dd}"
      user     => "elastic"
      password => "${ELASTIC_PASSWORD}"
      bulk_max_size     => 500   # Zeek is high volume; larger batches for throughput
      idle_flush_time   => 5
      retry_on_conflict => 3
      ilm_enabled       => false
    }

  } else {

    # Generic index for all other events (Kubernetes logs, app logs, etc.)
    elasticsearch {
      hosts    => ["http://securecloud-es-master:9200"]
      index    => "securecloud-logs-%{+YYYY.MM.dd}"
      user     => "elastic"
      password => "${ELASTIC_PASSWORD}"
      bulk_max_size     => 250
      idle_flush_time   => 5
      retry_on_conflict => 3
      ilm_enabled       => false
    }

  }

  # ── Dead letter queue debug output (disabled by default) ─────────────────
  # Uncomment during troubleshooting to see events that failed all retries.
  # if "_jsonparsefailure" in [tags] or "_zeek_date_parse_failure" in [tags] {
  #   stdout { codec => rubydebug }
  # }
}
