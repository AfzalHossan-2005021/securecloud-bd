# ──────────────────────────────────────────────────────────────────────────────
# service-accounts.yaml
#
# Dedicated ServiceAccounts for every workload in the SecureCloud-BD stack.
#
# Security principles applied:
#
#   1. One identity per workload (NIST SP 800-207 §2.3)
#      Each pod runs under its own ServiceAccount so that AuthorizationPolicies,
#      RBAC Roles, and Istio mTLS identities (SPIFFE SVIDs) are scoped to exactly
#      one workload.  The default ServiceAccount is intentionally left unused.
#
#   2. No auto-mounted tokens (CIS Kubernetes Benchmark 5.1.6)
#      automountServiceAccountToken: false is set on every account.  Pods that
#      genuinely need API server access must opt in per-deployment with:
#        spec.automountServiceAccountToken: true
#      This prevents a compromised pod from reading its token at
#      /var/run/secrets/kubernetes.io/serviceaccount/token and calling the
#      Kubernetes API without an explicit grant.
#
#   3. Descriptive labels for audit
#      securecloud.io/component labels make it easy to identify which workload
#      owns which RBAC binding in `kubectl get rolebindings -A -o wide` output.
# ──────────────────────────────────────────────────────────────────────────────

# ── apps namespace ────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: apps
  labels:
    app: frontend
    securecloud.io/component: bkash-frontend
  annotations:
    securecloud.io/rationale: >
      Identity for the Flask bKash frontend.  Only needs to read its own
      ConfigMap (PAYMENT_API_URL, LOG_LEVEL).  Cannot read Secrets directly;
      SECRET_KEY is injected via the Downward API from the Deployment spec.
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-api
  namespace: apps
  labels:
    app: payment-api
    securecloud.io/component: bkash-payment-api
  annotations:
    securecloud.io/rationale: >
      Identity for the FastAPI payment service.  Needs to read its ConfigMap
      (DB_HOST, DB_NAME, transfer limits) and its Secret (DB credentials).
      No other Kubernetes API access is required — DB connections are made
      directly over TCP, not through the API server.
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-db
  namespace: apps
  labels:
    app: user-db
    securecloud.io/component: bkash-user-db
  annotations:
    securecloud.io/rationale: >
      Identity for the PostgreSQL StatefulSet.  PostgreSQL has no legitimate
      reason to call the Kubernetes API.  This account exists solely to
      provide an Istio SPIFFE identity (SVID) for mTLS with payment-api.
      No RBAC Roles are bound to this account.
automountServiceAccountToken: false

---
# ── ml-engine namespace ───────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-infer
  namespace: ml-engine
  labels:
    app: ml-infer
    securecloud.io/component: ml-inference
  annotations:
    securecloud.io/rationale: >
      Identity for the ML inference service.  Granted read access to the
      monitoring namespace ConfigMaps so it can discover Prometheus endpoints
      for self-reporting anomaly score metrics without hardcoded URLs.
automountServiceAccountToken: false

---
# ── securecloud namespace ─────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: threat-api
  namespace: securecloud
  labels:
    app: threat-api
    securecloud.io/component: threat-scoring-api
  annotations:
    securecloud.io/rationale: >
      Identity for the FastAPI threat-scoring service.  Reads its own ConfigMap
      for model path and ensemble weights.  No other Kubernetes API calls needed.
automountServiceAccountToken: false

---
# ── monitoring namespace ──────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    securecloud.io/component: prometheus
  annotations:
    securecloud.io/rationale: >
      Identity for Prometheus.  Requires cluster-wide read access to pods,
      services, endpoints, and nodes for service discovery (bound via
      ClusterRole in role-bindings.yaml).  This is the one account that
      legitimately needs broad read access.
automountServiceAccountToken: false

---
# ── siem namespace ────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: siem
  labels:
    app: filebeat
    securecloud.io/component: filebeat-log-shipper
  annotations:
    securecloud.io/rationale: >
      Identity for Filebeat DaemonSet.  Needs cluster-wide read on pods,
      namespaces, and nodes to enrich log events with Kubernetes metadata
      (the `add_kubernetes_metadata` processor).
automountServiceAccountToken: false
