  namespace: ml-engine
  annotations:
    nist-sp-800-207: "Section 2.1 — DNS minimum required for service discovery"
    securecloud.io/policy-tier: "infrastructure"
    securecloud.io/flow: "all-pods → kube-dns:53"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

