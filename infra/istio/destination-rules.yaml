apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: securecloud-mtls
  namespace: securecloud
spec:
  host: "*.securecloud.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
