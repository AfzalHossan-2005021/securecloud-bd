<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}bKash Demo{% endblock %} — SecureCloud-BD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; color: #1a202c; }
    header {
      background: #e2136e; color: #fff;
      padding: 1rem 2rem;
      display: flex; align-items: center; gap: 1rem;
    }
    header h1 { font-size: 1.4rem; letter-spacing: .02em; }
    header span.badge {
      font-size: .7rem; background: rgba(255,255,255,.25);
      padding: .2rem .5rem; border-radius: 999px; letter-spacing: .05em;
    }
    nav { background: #c01060; padding: .5rem 2rem; }
    nav a { color: #ffd6e7; text-decoration: none; margin-right: 1.5rem; font-size: .9rem; }
    nav a:hover { color: #fff; text-decoration: underline; }
    main { max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      padding: 1.5rem 2rem; margin-bottom: 1.5rem;
    }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #e2136e; }
    label { display: block; font-size: .85rem; color: #4a5568; margin-bottom: .25rem; }
    input[type=text], input[type=number] {
      width: 100%; padding: .55rem .75rem;
      border: 1px solid #cbd5e0; border-radius: 5px;
      font-size: .95rem; margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #e2136e; box-shadow: 0 0 0 2px #fbd7e8; }
    button[type=submit] {
      width: 100%; padding: .65rem;
      background: #e2136e; color: #fff;
      border: none; border-radius: 5px;
      font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    button[type=submit]:hover { background: #c01060; }
    .alert { padding: .75rem 1rem; border-radius: 5px; margin-bottom: 1rem; font-size: .9rem; }
    .alert-warning { background: #fffbeb; border: 1px solid #f6e05e; color: #744210; }
    .alert-danger  { background: #fff5f5; border: 1px solid #feb2b2; color: #742a2a; }
    .alert-success { background: #f0fff4; border: 1px solid #9ae6b4; color: #22543d; }
    .kv { display: flex; justify-content: space-between; padding: .4rem 0;
          border-bottom: 1px solid #edf2f7; font-size: .9rem; }
    .kv:last-child { border-bottom: none; }
    .kv .label { color: #718096; }
    .kv .value { font-weight: 600; }
    footer { text-align: center; color: #a0aec0; font-size: .75rem; padding: 2rem 0; }
  </style>
</head>
<body>
<header>
  <h1>&#127974; bKash Demo</h1>
  <span class="badge">SecureCloud-BD</span>
</header>
<nav>
  <a href="/">Home</a>
  <a href="/balance">Check Balance</a>
  <a href="/transfer">Send Money</a>
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<footer>SecureCloud-BD demo &mdash; for research use only</footer>
</body>
</html>
