# Secret template — replace <REPLACE> values before applying.
#
# Apply with:
#   kubectl create secret generic user-db-secret \
#     --from-literal=POSTGRES_USER=<your-db-user> \
#     --from-literal=POSTGRES_PASSWORD=<your-db-password> \
#     --namespace apps
#
# The same credentials must match payment-api-secret DB_USER / DB_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: user-db-secret
  namespace: apps
  labels:
    app: user-db
    component: bkash-demo
type: Opaque
stringData:
  POSTGRES_USER: "<REPLACE>"
  POSTGRES_PASSWORD: "<REPLACE>"
