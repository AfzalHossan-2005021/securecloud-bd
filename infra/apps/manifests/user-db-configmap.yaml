apiVersion: v1
kind: ConfigMap
metadata:
  name: user-db-config
  namespace: apps
  labels:
    app: user-db
    component: bkash-demo
data:
  POSTGRES_DB: "bkash"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  # max_connections kept low to fit in the single-node memory budget
  POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
