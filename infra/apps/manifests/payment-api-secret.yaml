# Secret template — replace <REPLACE> values before applying.
#
# Apply with:
#   kubectl create secret generic payment-api-secret \
#     --from-literal=DB_USER=<your-db-user> \
#     --from-literal=DB_PASSWORD=<your-db-password> \
#     --namespace apps
apiVersion: v1
kind: Secret
metadata:
  name: payment-api-secret
  namespace: apps
  labels:
    app: payment-api
    component: bkash-demo
type: Opaque
stringData:
  DB_USER: "<REPLACE>"
  DB_PASSWORD: "<REPLACE>"
