# Secret template — replace <REPLACE> values before applying.
# Generate a real secret key with:  python3 -c "import secrets; print(secrets.token_hex(32))"
#
# Apply with:
#   kubectl create secret generic frontend-secret \
#     --from-literal=SECRET_KEY=<your-value> \
#     --namespace apps
#
# Or seal with Bitnami Sealed Secrets / External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
  namespace: apps
  labels:
    app: frontend
    component: bkash-demo
type: Opaque
stringData:
  SECRET_KEY: "<REPLACE>"
