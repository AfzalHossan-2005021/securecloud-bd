apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: apps
  labels:
    app: frontend
    component: bkash-demo
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 5000
  type: ClusterIP
---
# NodePort for local Minikube access: minikube service frontend -n apps
apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: apps
  labels:
    app: frontend
    component: bkash-demo
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30080
  type: NodePort
